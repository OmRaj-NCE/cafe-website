<!DOCTYPE html>
<html lang="en">
<head>
  <!-- ===== META ===== -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
  <meta name="theme-color" content="#2C1810" />
  
  <!-- ===== RESOURCE HINTS (Improves FCP & LCP) ===== -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
  <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
  
  <!-- ===== PRELOAD CRITICAL RESOURCES ===== -->
  <!-- Preload critical fonts -->
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&family=Great+Vibes&display=swap" />
  
  <!-- Preload hero video (critical for LCP) -->
  <link rel="preload" as="video" href="/videos/hero-bg.mp4" type="video/mp4" />
  <link rel="preload" as="video" href="/videos/hero-bg.webm" type="video/webm" />
  
  <!-- Preload critical hero image (if using image instead of video) -->
  <link rel="preload" as="image" href="/images/hero-bg.jpg" />
  
  <!-- ===== FONTS (With display=swap to prevent CLS) ===== -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@300;400;600;700&display=swap" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;600;700&display=swap" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&display=swap" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" />
  
  <!-- ===== FAVICON ===== -->
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  
  <!-- ===== SEO ===== -->
  <title>Café Élégance — Premium Coffee House</title>
  <meta name="description" content="Indulge in the finest coffee, freshly baked pastries, and an ambiance that feels like home. Award-winning cafe with a passion for perfection." />
  <meta name="keywords" content="coffee shop, premium coffee, café, pastries, award winning, best coffee, coffee house" />
  <meta name="author" content="Café Élégance" />
  <meta name="robots" content="index, follow" />
  
  <!-- ===== OPEN GRAPH ===== -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Café Élégance — Premium Coffee House" />
  <meta property="og:description" content="Experience the art of coffee making. From bean to cup, every step is crafted with love." />
  <meta property="og:image" content="/images/og-cover.jpg" />
  <meta property="og:url" content="https://cafeelgance.com" />
  <meta property="og:locale" content="en_US" />
  
  <!-- ===== TWITTER ===== -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Café Élégance — Premium Coffee House" />
  <meta name="twitter:description" content="Experience the art of coffee making." />
  <meta name="twitter:image" content="/images/og-cover.jpg" />
  
  <!-- ===== CANONICAL ===== -->
  <link rel="canonical" href="https://cafeelgance.com" />
  
  <!-- ===== STRUCTURED DATA ===== -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Cafe",
      "name": "Café Élégance",
      "url": "https://cafeelgance.com",
      "telephone": "+91-99999-99999",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "123 Coffee Lane",
        "addressLocality": "Paris",
        "addressCountry": "FR"
      },
      "openingHours": "Mo-Su 07:00-22:00",
      "priceRange": "₹100 - ₹500",
      "servesCuisine": "Coffee, Pastries, Indian Cuisine"
    }
  </script>
  
  <!-- ===== CRITICAL CSS (Inline above-the-fold) ===== -->
  <style>
    /* Critical CSS - Prevents CLS */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-display: swap;
    }
    
    :root {
      --cream: #FFF8F0;
      --primary: #2C1810;
      --gold: #D4AF37;
      --dark: #1A0F0A;
      --coffee-light: #8B6B4B;
    }
    
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background: var(--cream);
      font-family: 'Inter', -apple-system, sans-serif;
      overflow-x: hidden;
    }
    
    #root {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    
    /* Loading placeholder - Prevents CLS */
    .loading-placeholder {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--cream);
      flex-direction: column;
      gap: 1rem;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }
    
    .loading-placeholder.hidden {
      opacity: 0;
      pointer-events: none;
    }
    
    .loading-placeholder .logo {
      font-family: 'Playfair Display', serif;
      font-size: 2.5rem;
      color: var(--primary);
      animation: pulseGlow 2s ease-in-out infinite;
    }
    
    .loading-placeholder .subtitle {
      font-family: 'Great Vibes', cursive;
      font-size: 1.2rem;
      color: var(--gold);
    }
    
    .loading-placeholder .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(212, 175, 55, 0.1);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    @keyframes pulseGlow {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }
    
    /* Reserve space for hero to prevent CLS */
    .hero-section {
      min-height: 100vh;
      position: relative;
      contain: layout style paint;
    }
    
    /* Reserve space for images */
    img, video, iframe {
      width: 100%;
      height: auto;
      display: block;
      aspect-ratio: attr(width) / attr(height);
    }
    
    /* Prevent layout shifts */
    .container {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 1.5rem;
    }
    
    .btn {
      min-height: 48px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    
    /* Hide loading placeholder when content loads */
    .app-loaded .loading-placeholder {
      display: none;
    }
  </style>
</head>
<body>
  <!-- ===== LOADING PLACEHOLDER (Prevents CLS) ===== -->
  <div class="loading-placeholder" id="loading-placeholder">
    <div class="logo">☕ Café Élégance</div>
    <div class="subtitle">Premium Coffee House</div>
    <div class="spinner"></div>
  </div>
  
  <!-- ===== REACT ROOT ===== -->
  <div id="root"></div>
  
  <!-- ===== VITE ENTRY ===== -->
  <script type="module" src="/src/index.js"></script>
  
  <!-- ===== HIDE LOADING PLACEHOLDER WHEN APP LOADS ===== -->
  <script>
    // Hide loading placeholder when React mounts
    document.addEventListener('DOMContentLoaded', function() {
      setTimeout(function() {
        const placeholder = document.getElementById('loading-placeholder');
        if (placeholder) {
          placeholder.classList.add('hidden');
          // Remove from DOM after animation
          setTimeout(function() {
            placeholder.style.display = 'none';
          }, 500);
        }
      }, 500);
    });
    
    // Also hide if React takes too long (fallback)
    setTimeout(function() {
      const placeholder = document.getElementById('loading-placeholder');
      if (placeholder && !placeholder.classList.contains('hidden')) {
        placeholder.classList.add('hidden');
        setTimeout(function() {
          placeholder.style.display = 'none';
        }, 500);
      }
    }, 3000);
  </script>
</body>
</html>
